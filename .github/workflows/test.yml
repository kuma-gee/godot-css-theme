name: "Test"

on:
  workflow_dispatch: {}
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Unit Test
        run: godot --headless -s tests/framework/test_runner.gd
        timeout-minutes: 2
